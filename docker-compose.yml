services:

  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:latest
    ports:
      - "9092:9092"
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    depends_on:
      - zookeeper

  mongo:
    image: mongo
    ports:
      - "27017:27017"

  backend:
    build: ./hrms-backend
    ports:
      - "5000:5000"
    depends_on:
      - mongo
      - kafka
    environment:
      - MONGO_URI=mongodb+srv://buttmoosa174:Pak03216156891@hrms.8n1rv.mongodb.net/?appName=HRMS
      - JWT_SECRET=sfdds8fds96f8ds6f987dsgf97ds97ytf97tdsf

  frontend:
    build: ./hrms-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend